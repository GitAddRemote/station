services:
  backend:
    image: ghcr.io/gitaddremote/station-backend:${STATION_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - '127.0.0.1:3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s

  frontend:
    image: ghcr.io/gitaddremote/station-frontend:${STATION_VERSION:-latest}
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:?DATABASE_USER is required} -d ${DATABASE_NAME:?DATABASE_NAME is required}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.production}
    command:
      [
        "sh",
        "-c",
        "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes --appendfsync everysec",
      ]
    volumes:
      - redis_aof:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.4.2
    restart: unless-stopped
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ${DOCKER_HOST_SOCKET:-/run/user/1001/docker.sock}:/var/run/docker.sock:ro
      - promtail_positions:/var/promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.1
    restart: unless-stopped
    ports:
      - '127.0.0.1:3010:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      GF_SECURITY_ADMIN_USER: admin
      GF_SERVER_ROOT_URL: https://grafana.drdnt.org
      GF_SERVER_DOMAIN: grafana.drdnt.org
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ALERT_EMAIL: ${GF_ALERT_EMAIL:?GF_ALERT_EMAIL is required}
      GF_SMTP_ENABLED: 'true'
      GF_SMTP_HOST: ${GF_SMTP_HOST:?GF_SMTP_HOST is required}
      GF_SMTP_USER: ${GF_SMTP_USER:?GF_SMTP_USER is required}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:?GF_SMTP_PASSWORD is required}
      GF_SMTP_FROM_ADDRESS: ${GF_ALERT_EMAIL}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_aof:
  loki_data:
  grafana_data:
  promtail_positions:
