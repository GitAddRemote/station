server {
    listen 80;
    server_name grafana.drdnt.org;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support for Grafana live log tailing
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Prevent idle WebSocket connections from being dropped during low-traffic periods
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Map Upgrade header to connection type so non-WebSocket requests
# do not receive a forced "upgrade" Connection header
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
