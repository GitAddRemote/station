name: Release

on:
  push:
    branches:
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/gitaddremote/station-backend
  FRONTEND_IMAGE: ghcr.io/gitaddremote/station-frontend

jobs:
  validate-release:
    name: Validate Release Branch
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: station_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend lint
        working-directory: backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
        run: pnpm run lint

      - name: Run backend unit tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          USE_REDIS_CACHE: 'false'
        run: pnpm test --coverage --passWithNoTests

      - name: Run backend E2E tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          USE_REDIS_CACHE: 'false'
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pnpm run test:e2e

      - name: Run backend build
        working-directory: backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
        run: pnpm run build

      - name: Run frontend lint
        working-directory: frontend
        run: pnpm run lint

      - name: Run frontend typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Run frontend build
        working-directory: frontend
        run: pnpm run build

  build-and-push:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: validate-release
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from release branch
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#release/}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release branch name: ${GITHUB_REF_NAME}" >&2
            echo "Expected branch format: release/vX.Y.Z" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:staging

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:staging

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists locally; skipping tag creation."
          elif git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists on origin; skipping tag creation."
          else
            git tag "${VERSION}" "${GITHUB_SHA}"
            git push origin "${VERSION}"
          fi

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        env:
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT: RELEASE_NOTES.md
        with:
          config: cliff.toml
          args: --tag "${{ needs.build-and-push.outputs.version }}" --strip header --output RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        env:
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT: CHANGELOG.md
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Persist generated CHANGELOG.md
        run: cp CHANGELOG.md "${RUNNER_TEMP}/CHANGELOG.md"

      - name: Checkout main for changelog update
        uses: actions/checkout@v4
        with:
          ref: main
          path: changelog-main
          fetch-depth: 0

      - name: Commit CHANGELOG.md to main
        working-directory: changelog-main
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -B changelog-sync origin/main
            cp "${RUNNER_TEMP}/CHANGELOG.md" CHANGELOG.md
            git add CHANGELOG.md

            if git diff --cached --quiet; then
              echo "CHANGELOG.md is already up to date"
              exit 0
            fi

            git commit -m "chore: update CHANGELOG.md for ${VERSION}"
            if git push origin HEAD:main; then
              exit 0
            fi

            git reset --hard origin/main
            sleep 2
          done

          echo "Failed to update CHANGELOG.md on main after 3 attempts" >&2
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-and-push.outputs.version }}
          name: ${{ needs.build-and-push.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: RELEASE_NOTES.md
