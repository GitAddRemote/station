<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--white); }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px; }
  .big { font-family: var(--font-display); font-weight: 700; font-size: 52px; letter-spacing: -0.03em; line-height: 1.05; color: var(--ink-900); }
  .sub { font-family: var(--font-display); font-weight: 500; font-size: 22px; color: var(--ink-600); margin-top: 8px; letter-spacing: -0.015em; }
</style></head>
<body>
  <div class="lbl">Space Grotesk · Display</div>
  <div class="big">Run your org like a flagship</div>
  <div class="sub">Aa Bb Cc · 0123456789 · The space-grotesk workhorse</div>
</body></html>
