[sources.docker_logs]
type = "docker_logs"
# Match by Compose service label so the name is stable regardless of project
# name or scale index (docker-compose.prod.yml sets container_name as a fallback)
include_label_groups = [{ "com.docker.compose.service" = "backend" }]

[transforms.parse_pino]
type = "remap"
inputs = ["docker_logs"]
source = '''
parsed, err = parse_json(.message)
if err == null {
  . = merge(., parsed)
} else {
  # Non-JSON line (NestJS startup banner, console.*, plain stderr) — forward as warn
  .level = 40
  .msg = .message
}
'''

[transforms.filter_level]
type = "filter"
inputs = ["parse_pino"]
# Pino level numbers: 40=warn, 50=error, 60=fatal
# Only ship warn+ to stay within Logtail free tier (1 GB/month)
condition = 'is_integer(.level) && .level >= 40'

[transforms.guard_token]
type = "filter"
inputs = ["filter_level"]
# Drop all events when LOGTAIL_SOURCE_TOKEN is not configured
condition = '"${LOGTAIL_SOURCE_TOKEN:-}" != ""'

[sinks.logtail]
type = "http"
inputs = ["guard_token"]
uri = "https://in.logtail.com"
encoding.codec = "json"
auth.strategy = "bearer"
auth.token = "${LOGTAIL_SOURCE_TOKEN:-}"
