name: Release

on:
  push:
    branches:
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/presstronic/station-backend
  FRONTEND_IMAGE: ghcr.io/presstronic/station-frontend

jobs:
  validate-release:
    name: Validate Release Branch
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: station_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend lint
        working-directory: backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
        run: pnpm run lint

      - name: Run backend unit tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          USE_REDIS_CACHE: 'false'
        run: pnpm test --coverage --passWithNoTests

      - name: Run backend E2E tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          USE_REDIS_CACHE: 'false'
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pnpm run test:e2e

      - name: Run backend build
        working-directory: backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
        run: pnpm run build

      - name: Run frontend lint
        working-directory: frontend
        run: pnpm run lint

      - name: Run frontend typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Run frontend build
        working-directory: frontend
        run: pnpm run build

  build-and-push:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: validate-release
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from release branch
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#release/}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release branch name: ${GITHUB_REF_NAME}" >&2
            echo "Expected branch format: release/vX.Y.Z" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:staging

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:staging

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env.production to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "$VPS_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts

          # Build .env.production from GitHub Secrets
          cat > /tmp/.env.production <<'ENVEOF'
          NODE_ENV=production
          PORT=3001
          APP_NAME=STATION BACKEND
          DATABASE_HOST=${{ secrets.DATABASE_HOST }}
          DATABASE_PORT=${{ secrets.DATABASE_PORT }}
          DATABASE_USER=${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          USE_REDIS_CACHE=true
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
          GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
          GF_ALERT_EMAIL=${{ secrets.GF_ALERT_EMAIL }}
          GF_SMTP_HOST=${{ secrets.GF_SMTP_HOST }}
          GF_SMTP_USER=${{ secrets.GF_SMTP_USER }}
          GF_SMTP_PASSWORD=${{ secrets.GF_SMTP_PASSWORD }}
          B2_ACCOUNT_ID=${{ secrets.B2_ACCOUNT_ID }}
          B2_APPLICATION_KEY=${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET=${{ secrets.B2_BUCKET }}
          DOCKER_HOST_SOCKET=/run/user/1001/docker.sock
          ENVEOF

          sed -i 's/^          //' /tmp/.env.production

          scp -i ~/.ssh/deploy_key /tmp/.env.production \
            "${VPS_USER}@${VPS_HOST}:/opt/station/.env.production"

          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" \
            'chmod 600 /opt/station/.env.production'

      - name: Run migrations
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" bash <<ENDSSH
            set -euo pipefail
            export DOCKER_HOST="unix:///run/user/\$(id -u)/docker.sock"
            docker run --rm \
              --env-file /opt/station/.env.production \
              --network station \
              ghcr.io/presstronic/station-backend:${VERSION} \
              sh -c "node node_modules/.bin/typeorm migration:run -d dist/data-source.js"
          ENDSSH

      - name: Deploy containers
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" bash <<ENDSSH
            set -euo pipefail
            export DOCKER_HOST="unix:///run/user/\$(id -u)/docker.sock"
            STATION_VERSION="${VERSION}" bash /opt/station/infra/scripts/deploy.sh
          ENDSSH

      - name: Verify deployment health
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" bash <<'ENDSSH'
            set -euo pipefail
            export DOCKER_HOST="unix:///run/user/$(id -u)/docker.sock"
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' station-backend 2>/dev/null || echo "missing")
              echo "  attempt ${i}/12: ${STATUS}"
              if [ "${STATUS}" = "healthy" ]; then
                echo "Backend is healthy."
                exit 0
              fi
              sleep 10
            done
            echo "Backend did not become healthy within 120s" >&2
            docker logs station-backend --tail=50 >&2
            exit 1
          ENDSSH

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists locally; skipping tag creation."
          elif git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists on origin; skipping tag creation."
          else
            git tag "${VERSION}" "${GITHUB_SHA}"
            git push origin "${VERSION}"
          fi

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        env:
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT: RELEASE_NOTES.md
        with:
          config: cliff.toml
          args: --tag "${{ needs.build-and-push.outputs.version }}" --strip header --output RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-and-push.outputs.version }}
          name: ${{ needs.build-and-push.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: RELEASE_NOTES.md
