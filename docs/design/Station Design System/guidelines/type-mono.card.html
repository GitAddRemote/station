<!-- @dsCard group="Type" viewport="700x180" name="Mono & eyebrows — JetBrains Mono" subtitle="Data, labels, eyebrows · uppercase + tracking" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--white); display: flex; flex-direction: column; gap: 16px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--aqua-600); display: inline-flex; align-items: center; gap: 8px; }
  .eyebrow::before { content:""; width: 18px; height: 1px; background: var(--aqua-600); }
  .data { font-family: var(--font-mono); display: flex; gap: 28px; }
  .data .v { font-size: 30px; font-weight: 600; color: var(--ink-900); }
  .data .k { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-400); }
  .row { font-family: var(--font-mono); font-size: 13px; color: var(--ink-600); }
</style></head>
<body>
  <span class="eyebrow">Capabilities</span>
  <div class="data">
    <div><div class="k">Treasury</div><div class="v">8.42M</div></div>
    <div><div class="k">Members</div><div class="v">312</div></div>
    <div><div class="k">Contracts</div><div class="v">27</div></div>
  </div>
  <div class="row">station.app / atlas-vanguard / overview</div>
</body></html>
