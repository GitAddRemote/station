name: Issue Automation

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main]

jobs:
  remove-pr-from-project:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Remove PR from project board
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PROJECT_TOKEN }}
          script: |
            const prNodeId = context.payload.pull_request.node_id;
            const prNumber = context.payload.pull_request.number;
            const projectId = 'PVT_kwHOA0dnmc4BUBC2';

            // Find the project item for this PR
            let cursor = null;
            let projectItemId = null;

            do {
              const resp = await github.graphql(`
                query($projectId: ID!, $cursor: String) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          content { ... on PullRequest { id } }
                        }
                      }
                    }
                  }
                }
              `, { projectId, cursor });

              const page = resp.node.items;
              const match = page.nodes.find(item => item.content?.id === prNodeId);
              if (match) {
                projectItemId = match.id;
                break;
              }
              cursor = page.pageInfo.hasNextPage ? page.pageInfo.endCursor : null;
            } while (cursor);

            if (!projectItemId) {
              console.log(`PR #${prNumber} not found in project — nothing to remove`);
              return;
            }

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!) {
                deleteProjectV2Item(input: { projectId: $projectId, itemId: $itemId }) {
                  deletedItemId
                }
              }
            `, { projectId, itemId: projectItemId });

            console.log(`PR #${prNumber} removed from project`);

  move-linked-issues-to-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Move linked issues to Done
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PROJECT_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;

            // Extract issue numbers from "Closes #N", "Fixes #N", "Resolves #N" patterns
            const pattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const issueNumbers = [];
            let match;
            while ((match = pattern.exec(prBody)) !== null) {
              issueNumbers.push(parseInt(match[1], 10));
            }

            if (issueNumbers.length === 0) {
              console.log(`PR #${prNumber}: no linked issues found in body`);
              return;
            }

            console.log(`PR #${prNumber}: linked issues: ${issueNumbers.join(', ')}`);

            const projectId = 'PVT_kwHOA0dnmc4BUBC2';
            const statusFieldId = 'PVTSSF_lAHOA0dnmc4BUBC2zhBMCQE';
            const doneOptionId = 'a29782f7';

            for (const issueNumber of issueNumbers) {
              // Get the issue's node ID
              const issueResp = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              const issueNodeId = issueResp.data.node_id;
              console.log(`Issue #${issueNumber} node_id: ${issueNodeId}`);

              // Find the project item for this issue
              const itemResp = await github.graphql(`
                query($projectId: ID!, $cursor: String) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          content { ... on Issue { id } }
                        }
                      }
                    }
                  }
                }
              `, { projectId });

              const items = itemResp.node.items.nodes;
              const projectItem = items.find(item => item.content?.id === issueNodeId);

              if (!projectItem) {
                console.log(`Issue #${issueNumber} not found in project — skipping`);
                continue;
              }

              // Update the Status field to Done
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId,
                itemId: projectItem.id,
                fieldId: statusFieldId,
                optionId: doneOptionId,
              });

              console.log(`Issue #${issueNumber} moved to Done`);
            }
