[sources.docker_logs]
type = "docker_logs"
include_containers = ["station-backend-1"]

[transforms.filter_level]
type = "filter"
inputs = ["docker_logs"]
# Pino level numbers: 30=info, 40=warn, 50=error, 60=fatal
# Only ship warn+ to stay within Logtail free tier (1 GB/month)
condition = '.message != null && (.message | contains("\"level\":40") || .message | contains("\"level\":50") || .message | contains("\"level\":60"))'

[sinks.logtail]
type = "http"
inputs = ["filter_level"]
uri = "https://in.logtail.com"
encoding.codec = "json"
auth.strategy = "bearer"
auth.token = "${LOGTAIL_SOURCE_TOKEN}"
