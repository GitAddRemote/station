services:
  backend:
    image: ghcr.io/gitaddremote/station-backend:${STATION_VERSION:-staging}
    restart: unless-stopped
    env_file:
      - .env.staging
    ports:
      - '127.0.0.1:3002:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s

  frontend:
    image: ghcr.io/gitaddremote/station-frontend:${STATION_VERSION:-staging}
    restart: unless-stopped
    ports:
      - '127.0.0.1:3003:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME is required}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:?DATABASE_USER is required} -d ${DATABASE_NAME:?DATABASE_NAME is required}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.staging}
    command:
      [
        "sh",
        "-c",
        "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes --appendfsync everysec",
      ]
    volumes:
      - redis_staging_aof:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres_staging_data:
  redis_staging_aof:
