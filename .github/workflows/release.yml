name: Release

on:
  push:
    branches:
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/gitaddremote/station-backend
  FRONTEND_IMAGE: ghcr.io/gitaddremote/station-frontend

jobs:
  validate-release:
    name: Validate Release Branch
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: station_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend lint
        working-directory: backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
        run: pnpm run lint

      - name: Run backend unit tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          USE_REDIS_CACHE: 'false'
        run: pnpm test --coverage --passWithNoTests

      - name: Run backend E2E tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          USE_REDIS_CACHE: 'false'
        run: pnpm run test:e2e

      - name: Run backend build
        working-directory: backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: station_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
        run: pnpm run build

      - name: Run frontend lint
        working-directory: frontend
        run: pnpm run lint

      - name: Run frontend typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Run frontend build
        working-directory: frontend
        run: pnpm run build

  build-and-push:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: validate-release
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from release branch
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#release/}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release branch name: ${GITHUB_REF_NAME}" >&2
            echo "Expected branch format: release/vX.Y.Z" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:staging

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:staging

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    concurrency:
      group: station-deploy
      cancel-in-progress: false

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Configure SSH known_hosts
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write staging environment file
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          B2_ACCOUNT_ID: ${{ secrets.B2_ACCOUNT_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          LOGTAIL_SOURCE_TOKEN: ${{ secrets.LOGTAIL_SOURCE_TOKEN }}
          BACKUP_HEALTHCHECK_URL: ${{ secrets.BACKUP_HEALTHCHECK_URL }}
          UEX_API_KEY: ${{ secrets.UEX_API_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "mkdir -p /opt/station"
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "cat > /opt/station/.env.staging <<'ENVEOF'
          NODE_ENV=production
          PORT=3001
          APP_NAME=\"STATION BACKEND STAGING\"
          JWT_SECRET=${JWT_SECRET}
          ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
          FRONTEND_URL=${FRONTEND_URL}
          DATABASE_HOST=${DATABASE_HOST}
          DATABASE_PORT=${DATABASE_PORT}
          DATABASE_USER=${DATABASE_USER}
          DATABASE_PASSWORD=${DATABASE_PASSWORD}
          DATABASE_NAME=${DATABASE_NAME}
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${REDIS_PASSWORD}
          USE_REDIS_CACHE=true
          REFRESH_TOKEN_CLEANUP_CRON=\"0 3 * * *\"
          THROTTLE_TTL_MS=60000
          THROTTLE_LIMIT=100
          AUTH_LOGIN_THROTTLE_TTL_MS=60000
          AUTH_LOGIN_THROTTLE_LIMIT=10
          AUTH_REGISTER_THROTTLE_TTL_MS=60000
          AUTH_REGISTER_THROTTLE_LIMIT=5
          AUTH_FORGOT_THROTTLE_TTL_MS=60000
          AUTH_FORGOT_THROTTLE_LIMIT=5
          SENTRY_DSN=${SENTRY_DSN}
          SENTRY_RELEASE=${GITHUB_SHA}
          LOGTAIL_SOURCE_TOKEN=${LOGTAIL_SOURCE_TOKEN}
          B2_ACCOUNT_ID=${B2_ACCOUNT_ID}
          B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
          B2_BUCKET=${B2_BUCKET}
          BACKUP_HEALTHCHECK_URL=${BACKUP_HEALTHCHECK_URL}
          UEX_SYNC_ENABLED=true
          UEX_CATEGORIES_SYNC_ENABLED=true
          UEX_ITEMS_SYNC_ENABLED=true
          UEX_LOCATIONS_SYNC_ENABLED=true
          UEX_API_BASE_URL=https://uexcorp.space/api/2.0
          UEX_TIMEOUT_MS=60000
          UEX_BATCH_SIZE=100
          UEX_CONCURRENT_CATEGORIES=3
          UEX_RETRY_ATTEMPTS=3
          UEX_BACKOFF_BASE_MS=1000
          UEX_RATE_LIMIT_PAUSE_MS=2000
          UEX_ENDPOINTS_PAUSE_MS=2000
          UEX_API_KEY=${UEX_API_KEY}
          STATION_VERSION=staging
          ENVEOF
          chmod 600 /opt/station/.env.staging"

      - name: Deploy staging
        env:
          STATION_VERSION: ${{ needs.build-and-push.outputs.version }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ESCAPED_STATION_VERSION="$(printf '%q' "${STATION_VERSION}")"
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" \
            "cd /opt/station && STATION_VERSION=${ESCAPED_STATION_VERSION} bash infra/scripts/deploy-staging.sh"

      - name: Wait for staging health
        env:
          STAGING_HEALTH_URL: https://staging.api.drdnt.org/health
        run: |
          deadline=$((SECONDS + 120))
          for attempt in $(seq 1 24); do
            remaining=$((deadline - SECONDS))
            if [ "$remaining" -le 0 ]; then
              break
            fi

            max_time=$remaining
            if [ "$max_time" -gt 10 ]; then
              max_time=10
            fi

            if curl --fail --silent --show-error --connect-timeout 5 --max-time "$max_time" "$STAGING_HEALTH_URL" >/dev/null; then
              exit 0
            fi

            remaining=$((deadline - SECONDS))
            if [ "$remaining" -le 0 ]; then
              break
            fi
            sleep 5
          done
          echo "Staging health check failed"
          exit 1

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy-staging
    environment: production
    concurrency:
      group: station-deploy
      cancel-in-progress: false

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Configure SSH known_hosts
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write production environment file
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          B2_ACCOUNT_ID: ${{ secrets.B2_ACCOUNT_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          LOGTAIL_SOURCE_TOKEN: ${{ secrets.LOGTAIL_SOURCE_TOKEN }}
          BACKUP_HEALTHCHECK_URL: ${{ secrets.BACKUP_HEALTHCHECK_URL }}
          UEX_API_KEY: ${{ secrets.UEX_API_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "mkdir -p /opt/station"
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "cat > /opt/station/.env.production <<'ENVEOF'
          NODE_ENV=production
          PORT=3001
          APP_NAME=STATION BACKEND
          JWT_SECRET=${JWT_SECRET}
          ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
          FRONTEND_URL=${FRONTEND_URL}
          DATABASE_HOST=${DATABASE_HOST}
          DATABASE_PORT=${DATABASE_PORT}
          DATABASE_USER=${DATABASE_USER}
          DATABASE_PASSWORD=${DATABASE_PASSWORD}
          DATABASE_NAME=${DATABASE_NAME}
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${REDIS_PASSWORD}
          USE_REDIS_CACHE=true
          REFRESH_TOKEN_CLEANUP_CRON=\"0 3 * * *\"
          THROTTLE_TTL_MS=60000
          THROTTLE_LIMIT=100
          AUTH_LOGIN_THROTTLE_TTL_MS=60000
          AUTH_LOGIN_THROTTLE_LIMIT=10
          AUTH_REGISTER_THROTTLE_TTL_MS=60000
          AUTH_REGISTER_THROTTLE_LIMIT=5
          AUTH_FORGOT_THROTTLE_TTL_MS=60000
          AUTH_FORGOT_THROTTLE_LIMIT=5
          SENTRY_DSN=${SENTRY_DSN}
          SENTRY_RELEASE=${GITHUB_SHA}
          LOGTAIL_SOURCE_TOKEN=${LOGTAIL_SOURCE_TOKEN}
          B2_ACCOUNT_ID=${B2_ACCOUNT_ID}
          B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
          B2_BUCKET=${B2_BUCKET}
          BACKUP_HEALTHCHECK_URL=${BACKUP_HEALTHCHECK_URL}
          UEX_SYNC_ENABLED=true
          UEX_CATEGORIES_SYNC_ENABLED=true
          UEX_ITEMS_SYNC_ENABLED=true
          UEX_LOCATIONS_SYNC_ENABLED=true
          UEX_API_BASE_URL=https://uexcorp.space/api/2.0
          UEX_TIMEOUT_MS=60000
          UEX_BATCH_SIZE=100
          UEX_CONCURRENT_CATEGORIES=3
          UEX_RETRY_ATTEMPTS=3
          UEX_BACKOFF_BASE_MS=1000
          UEX_RATE_LIMIT_PAUSE_MS=2000
          UEX_ENDPOINTS_PAUSE_MS=2000
          UEX_API_KEY=${UEX_API_KEY}
          STATION_VERSION=${{ needs.build-and-push.outputs.version }}
          ENVEOF
          chmod 600 /opt/station/.env.production"

      - name: Write production rclone config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          B2_ACCOUNT_ID: ${{ secrets.B2_ACCOUNT_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "cat > /opt/station/rclone.conf <<'RCLONEEOF'
          [b2]
          type = b2
          account = ${B2_ACCOUNT_ID}
          key = ${B2_APPLICATION_KEY}
          hard_delete = false
          RCLONEEOF
          chmod 600 /opt/station/rclone.conf"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-deploy database backup
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" \
            "cd /opt/station && BACKUP_LABEL=pre-deploy-${GITHUB_SHA::7} bash infra/scripts/backup-db.sh"

      - name: Verify pre-deploy backup uploaded
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" \
            "cd /opt/station && export RCLONE_CONFIG=/opt/station/rclone.conf && \
             source /opt/station/.env.production && \
             rclone ls \"b2:${B2_BUCKET}/postgres/\" | grep \"pre-deploy-${GITHUB_SHA::7}\\.sql.gz\""

      - name: Deploy production
        env:
          STATION_VERSION: ${{ needs.build-and-push.outputs.version }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ESCAPED_STATION_VERSION="$(printf '%q' "${STATION_VERSION}")"
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" \
            "cd /opt/station && STATION_VERSION=${ESCAPED_STATION_VERSION} bash infra/scripts/deploy.sh"

      - name: Wait for production health
        env:
          PRODUCTION_HEALTH_URL: https://api.drdnt.org/health
        run: |
          deadline=$((SECONDS + 120))
          for attempt in $(seq 1 24); do
            remaining=$((deadline - SECONDS))
            if [ "$remaining" -le 0 ]; then
              break
            fi

            max_time=$remaining
            if [ "$max_time" -gt 10 ]; then
              max_time=10
            fi

            if curl --fail --silent --show-error --connect-timeout 5 --max-time "$max_time" "$PRODUCTION_HEALTH_URL" >/dev/null; then
              exit 0
            fi

            remaining=$((deadline - SECONDS))
            if [ "$remaining" -le 0 ]; then
              break
            fi
            sleep 5
          done
          echo "Production health check failed"
          exit 1

      - name: Promote images to latest
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          docker buildx imagetools create \
            --tag "${BACKEND_IMAGE}:latest" \
            "${BACKEND_IMAGE}:${VERSION}"
          docker buildx imagetools create \
            --tag "${FRONTEND_IMAGE}:latest" \
            "${FRONTEND_IMAGE}:${VERSION}"

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists locally; skipping tag creation."
          elif git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists on origin; skipping tag creation."
          else
            git tag "${VERSION}" "${GITHUB_SHA}"
            git push origin "${VERSION}"
          fi

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        env:
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT: RELEASE_NOTES.md
        with:
          config: cliff.toml
          args: --tag "${{ needs.build-and-push.outputs.version }}" --strip header --output RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        env:
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT: CHANGELOG.md
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Persist generated CHANGELOG.md
        run: cp CHANGELOG.md "${RUNNER_TEMP}/CHANGELOG.md"

      - name: Checkout main for changelog update
        uses: actions/checkout@v4
        with:
          ref: main
          path: changelog-main
          fetch-depth: 0

      - name: Commit CHANGELOG.md to main
        working-directory: changelog-main
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -B changelog-sync origin/main
            cp "${RUNNER_TEMP}/CHANGELOG.md" CHANGELOG.md
            git add CHANGELOG.md

            if git diff --cached --quiet; then
              echo "CHANGELOG.md is already up to date"
              exit 0
            fi

            git commit -m "chore: update CHANGELOG.md for ${VERSION}"
            if git push origin HEAD:main; then
              exit 0
            fi

            git reset --hard origin/main
            sleep 2
          done

          echo "Failed to update CHANGELOG.md on main after 3 attempts" >&2
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-and-push.outputs.version }}
          name: ${{ needs.build-and-push.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: RELEASE_NOTES.md
